name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCHEME: PYNQControl

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install JS dependencies
        run: npm install

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: List available schemes (debug)
        run: |
          cd ios
          xcodebuild -list 2>&1 || true

      - name: Build archive (no code signing)
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/${{ env.SCHEME }}.xcworkspace \
            -scheme ${{ env.SCHEME }} \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/${{ env.SCHEME }}.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP=$(find "$RUNNER_TEMP/${{ env.SCHEME }}.xcarchive/Products/Applications" \
                     -maxdepth 1 -name "*.app" | head -1)
          echo "Found app: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -r "$APP" "$RUNNER_TEMP/Payload/"
          cd "$RUNNER_TEMP"
          zip -qr PYNQControl.ipa Payload
          echo "IPA size: $(du -sh PYNQControl.ipa | cut -f1)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PYNQControl-IPA
          path: ${{ runner.temp }}/PYNQControl.ipa
          retention-days: 30
