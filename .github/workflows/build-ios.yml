name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install JS dependencies
        run: npm install

      - name: Expo prebuild (generates Xcode project)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Detect scheme and build archive (no code signing)
        run: |
          cd ios
          SCHEME=$(ls *.xcworkspace | sed 's/.xcworkspace//')
          echo "Building scheme: $SCHEME"
          xcodebuild \
            -workspace ${SCHEME}.xcworkspace \
            -scheme ${SCHEME} \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/${SCHEME}.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | tail -50
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      - name: Package unsigned IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$RUNNER_TEMP/${SCHEME}.xcarchive/Products/Applications/${SCHEME}.app" \
                "$RUNNER_TEMP/Payload/"
          cd $RUNNER_TEMP
          zip -qr PYNQControl.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PYNQControl-IPA
          path: ${{ runner.temp }}/PYNQControl.ipa
          retention-days: 30
