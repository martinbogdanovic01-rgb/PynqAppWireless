name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Xcode project
        run: npx expo prebuild --platform ios --no-install

      - name: Build (unsigned)
        run: |
          xcodebuild archive \
            -workspace ios/PYNQControl.xcworkspace \
            -scheme PYNQControl \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $RUNNER_TEMP/PYNQControl.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Export IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa
          cp -r "$RUNNER_TEMP/PYNQControl.xcarchive/Products/Applications/PYNQControl.app" \
                $RUNNER_TEMP/ipa/
          cd $RUNNER_TEMP/ipa
          zip -r $GITHUB_WORKSPACE/PYNQControl.ipa .

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: PYNQ-Audio-Controller
          path: PYNQControl.ipa
          retention-days: 30
